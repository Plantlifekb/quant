services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
      POSTGRES_DB: quant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 5s
      timeout: 3s
      retries: 20

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: ["python", "-m", "quant.engine.orchestrator"]
    environment:
      DATABASE_URL: postgresql://quant:quant@db:5432/quant
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8050:8050"
    environment:
      DATABASE_URL: postgresql://quant:quant@db:5432/quant
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: