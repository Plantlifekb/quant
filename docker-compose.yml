version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
      POSTGRES_DB: quant
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  engine:
    build: .
    command: ["python", "-m", "quant.engine.main"]
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://quant:quant@db:5432/quant

  dashboard:
    build: .
    command: ["python", "-m", "quant.dashboard.app"]
    depends_on:
      - db
    ports:
      - "8050:8050"
    environment:
      DATABASE_URL: postgresql://quant:quant@db:5432/quant

volumes:
  pgdata:
